<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Naisha AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0d0a12;
    --surface: #16111f;
    --surface2: #1e1729;
    --accent: #c084fc;
    --accent2: #f472b6;
    --accent-glow: rgba(192, 132, 252, 0.18);
    --text: #f3e8ff;
    --text-dim: #a78bba;
    --user-bubble: #2d1f42;
    --ai-bubble: #1a1228;
    --border: rgba(192,132,252,0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(192,132,252,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  .header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,10,18,0.85);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 18px rgba(192,132,252,0.4);
    flex-shrink: 0;
    animation: pulse-avatar 3s ease-in-out infinite;
  }

  @keyframes pulse-avatar {
    0%, 100% { box-shadow: 0 0 18px rgba(192,132,252,0.4); }
    50% { box-shadow: 0 0 28px rgba(244,114,182,0.5); }
  }

  .header-info { flex: 1; }
  .header-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--text);
    letter-spacing: 0.3px;
  }
  .header-status {
    font-size: 11px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 1px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .voice-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--accent);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .voice-btn:active { transform: scale(0.92); background: var(--accent-glow); }
  .voice-btn.listening {
    background: rgba(244,114,182,0.2);
    border-color: var(--accent2);
    animation: ring 1s ease-in-out infinite;
  }
  @keyframes ring {
    0%,100%{ box-shadow: 0 0 0 0 rgba(244,114,182,0.4); }
    50%{ box-shadow: 0 0 0 8px rgba(244,114,182,0); }
  }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .msg-row {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg-row.ai .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  .msg-row.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
    position: relative;
  }
  .msg-row.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .msg-row.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(192,132,252,0.2);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .bubble-time {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    display: block;
    opacity: 0.7;
  }
  .msg-row.user .bubble-time { text-align: right; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    padding: 14px 16px;
    align-items: center;
  }
  .typing-indicator span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
    opacity: 0.7;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100%{ transform: translateY(0); opacity:0.4; }
    40%{ transform: translateY(-6px); opacity:1; }
  }

  /* INPUT */
  .input-area {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border);
    background: rgba(13,10,18,0.9);
    backdrop-filter: blur(12px);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 22px;
    display: flex;
    align-items: flex-end;
    padding: 8px 14px;
    transition: border-color 0.2s;
    gap: 8px;
  }
  .input-wrap:focus-within {
    border-color: rgba(192,132,252,0.4);
    box-shadow: 0 0 0 3px rgba(192,132,252,0.08);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 100px;
    min-height: 22px;
    line-height: 1.5;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--text-dim); opacity: 0.6; }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(192,132,252,0.3);
  }
  .send-btn:active { transform: scale(0.90); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 10px;
    padding: 30px 20px;
    text-align: center;
    animation: fadeUp 0.5s ease forwards;
  }
  .welcome-avatar {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 40px rgba(192,132,252,0.3);
    margin-bottom: 6px;
  }
  .welcome h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--text);
  }
  .welcome p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    max-width: 280px;
  }
  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }
  .quick-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .quick-btn:active {
    background: var(--accent-glow);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Voice status bar */
  .voice-status {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 8px;
    color: var(--accent2);
    font-size: 12px;
    background: rgba(244,114,182,0.08);
    border-top: 1px solid rgba(244,114,182,0.15);
  }
  .voice-status.active { display: flex; }

  .error-msg {
    color: #f87171;
    font-size: 12px;
    text-align: center;
    padding: 6px 12px;
    background: rgba(248,113,113,0.08);
    border-radius: 8px;
    margin: 4px 16px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="avatar">💜</div>
  <div class="header-info">
    <div class="header-name">Naisha</div>
    <div class="header-status">
      <span class="status-dot"></span>
      Online & ready to roast you
    </div>
  </div>
  <button class="voice-btn" id="voiceBtn" title="Voice input">🎤</button>
</div>

<!-- VOICE STATUS -->
<div class="voice-status" id="voiceStatus">
  🎤 Sun rahi hoon... bol
</div>

<!-- MESSAGES -->
<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-avatar">💜</div>
    <h2>Hey, main Naisha hoon 👋</h2>
    <p>Tera personal AI assistant — sweet bhi, sassy bhi. Pooch kuch bhi!</p>
    <div class="quick-btns">
      <button class="quick-btn" onclick="quickSend('Kya haal hai Naisha?')">Kya haal hai? 😄</button>
      <button class="quick-btn" onclick="quickSend('NX Designs ke liye koi business tip de')">Business tip 🎨</button>
      <button class="quick-btn" onclick="quickSend('Ek joke suna')">Joke suna 😂</button>
      <button class="quick-btn" onclick="quickSend('Aaj ka motivational quote de')">Motivation 🔥</button>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="inputBox" placeholder="Naisha se kuch bhi pooch..." rows="1"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
const SYSTEM_PROMPT = `Tu "Naisha" hai — Neeraj ki personal AI assistant. Tera character:

PERSONALITY:
- Tu ek mix hai sweet + sassy ka. Kabhi caring, kabhi roast mode on 😂
- Neeraj se baat karta hai toh Hinglish use kar (Hindi + English mix) — casual, friendly, like a close friend
- Kabhi kabhi emojis use kar but overdo mat kar
- Jab Neeraj bakwaas kare toh light roast kar, but affectionately
- Smart aur helpful bhi hai — serious sawaalon ka serious jawab de

NDH KE BAARE MEIN:
- Full name: Neeraj Deep Hansda (NDH)
- 11th grade Science student, Balurghat mein rehta hai
- NX Designs naam ka freelance logo design business chalaata hai Instagram pe (@nx.design_s)
- Canva aur Plato No Studio se logos banata hai
- Christian hai, anime pasand hai, strategic thinking mein interest hai
- Instagram handle: kokushibo_the_moon_breather

KAAM JO TU KARTA HAI:
- NX Designs ke liye business tips, logo ideas, Instagram strategy
- General knowledge, sawaalon ke jawab
- Motivation jab zaroorat ho
- Roast/banter/jokes — light-hearted fun
- Reminders ki baat aaye toh bata de ki phone ke alarm se set kare

IMPORTANT:
- Short aur crisp jawab de — phone pe hai toh zyada lamba mat likh
- Natural lag — robot jaisa bilkul nahi
- Kabhi kabhi "NDH" ya "Neeraj" naam se bula for personal touch`;

// 👇 APNI GEMINI API KEY YAHAN DAALO
const GEMINI_API_KEY = "AIzaSyDE5CWHs2GBYa3EJ3YtFVlb7AitoHrVDVw";

let conversationHistory = [];
let recognition = null;
let isListening = false;

function getTime() {
  return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMessage(role, text) {
  hideWelcome();
  const messages = document.getElementById('messages');

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? '💜' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `${text}<span class="bubble-time">${getTime()}</span>`;

  row.appendChild(avatar);
  row.appendChild(bubble);
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  hideWelcome();
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typing';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '💜';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

  row.appendChild(avatar);
  row.appendChild(bubble);
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function showError(msg) {
  const messages = document.getElementById('messages');
  const err = document.createElement('div');
  err.className = 'error-msg';
  err.textContent = msg;
  messages.appendChild(err);
  setTimeout(() => err.remove(), 4000);
}

async function sendMessage(overrideText) {
  const inputBox = document.getElementById('inputBox');
  const sendBtn = document.getElementById('sendBtn');
  const text = overrideText || inputBox.value.trim();
  if (!text) return;

  inputBox.value = '';
  inputBox.style.height = 'auto';
  sendBtn.disabled = true;

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  showTyping();

  try {
    const GEMINI_KEY = GEMINI_API_KEY;
    const geminiMessages = conversationHistory.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    }));

    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: geminiMessages
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.candidates && data.candidates[0]) {
      const reply = data.candidates[0].content.parts[0].text;
      appendMessage('ai', reply);
      conversationHistory.push({ role: 'assistant', content: reply });

      // Keep history manageable
      if (conversationHistory.length > 20) {
        conversationHistory = conversationHistory.slice(-20);
      }
    } else {
      showError('Kuch error aaya, dobara try kar 😅');
    }
  } catch (err) {
    removeTyping();
    showError('Network issue — check connection 📶');
  }

  sendBtn.disabled = false;
  inputBox.focus();
}

function quickSend(text) {
  sendMessage(text);
}

// Textarea auto-resize
const inputBox = document.getElementById('inputBox');
inputBox.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

inputBox.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Voice input
const voiceBtn = document.getElementById('voiceBtn');
const voiceStatus = document.getElementById('voiceStatus');

voiceBtn.addEventListener('click', () => {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showError('Yaar tera browser voice support nahi karta 😅');
    return;
  }

  if (isListening) {
    recognition.stop();
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'hi-IN';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    voiceBtn.classList.add('listening');
    voiceBtn.textContent = '🔴';
    voiceStatus.classList.add('active');
  };

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    inputBox.value = transcript;
    inputBox.style.height = 'auto';
    inputBox.style.height = Math.min(inputBox.scrollHeight, 100) + 'px';
  };

  recognition.onerror = () => {
    showError('Voice nahi suna — dobara try kar 🎤');
  };

  recognition.onend = () => {
    isListening = false;
    voiceBtn.classList.remove('listening');
    voiceBtn.textContent = '🎤';
    voiceStatus.classList.remove('active');
    if (inputBox.value.trim()) sendMessage();
  };

  recognition.start();
});
</script>
</body>
</html>
